<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Haven Events & Rentals</title>
    
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#c5a059">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3002/3002655.png">

    <style>
        :root {
            --gold: #c5a059;
            --navy: #0a192f;
            --white: #ffffff;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            background-color: #f9f9f9;
            color: var(--navy);
            text-align: center;
        }
        header {
            background-color: var(--navy);
            color: var(--gold);
            padding: 40px 20px;
            border-bottom: 4px solid var(--gold);
        }
        .container {
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        input, select {
            width: 80%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        button {
            background-color: var(--gold);
            color: var(--navy);
            border: none;
            padding: 15px 30px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 5px;
            margin-top: 10px;
            width: 80%;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        .gallery-item {
            background: white;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .gallery img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }
        .price-display {
            font-size: 1.5rem;
            color: var(--gold);
            font-weight: bold;
            margin: 20px 0;
        }
        footer {
            padding: 20px;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1>ROYAL HAVEN</h1>
    <p>Events & Rentals | Mubende's Finest</p>
</header>

<div class="container">
    <h2>Estimate Your Event</h2>
    <input type="number" id="guests" placeholder="Number of Guests">
    <select id="service">
        <option value="500">Standard Tent & Chairs (500/- per head)</option>
        <option value="1500">Luxury Setup + Catering (1,500/- per head)</option>
        <option value="2500">Premium Wedding Package (2,500/- per head)</option>
    </select>
    <button onclick="calculate()">Calculate Quote</button>
    <div class="price-display" id="result">Total: 0 UGX</div>
</div>

<div class="container">
    <h2>Our Portfolio</h2>
    <div id="mainGallery" class="gallery">
        <p>Loading the latest setups...</p>
    </div>
</div>

<footer>
    <p>© 2026 Royal Haven Events. Mubende, Uganda.<br>Contact: 0709569351</p>
</footer>

<script>
    // Register the Service Worker for PWA
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        });
    }

    // Calculator Logic
    function calculate() {
        const guests = document.getElementById('guests').value;
        const rate = document.getElementById('service').value;
        if(guests > 0) {
            const total = guests * rate;
            document.getElementById('result').innerText = "Total Estimate: " + total.toLocaleString() + " UGX";
        } else {
            alert("Please enter the number of guests.");
        }
    }

    // Fetch Gallery from your API
    async function loadGallery() {
        try {
            const response = await fetch('/api/events');
            const photos = await response.json();
            const galleryDiv = document.getElementById('mainGallery');
            
            if (photos.length === 0) {
                galleryDiv.innerHTML = "<p>No photos uploaded yet. Check back soon!</p>";
                return;
            }

            galleryDiv.innerHTML = photos.map(p => `
                <div class="gallery-item">
                    <img src="${p.url}" alt="${p.desc}">
                    <p><strong>${p.desc}</strong></p>
                </div>
            `).join('');
        } catch (e) {
            document.getElementById('mainGallery').innerHTML = "<p>Visit our Admin panel to add photos!</p>";
        }
    }

    window.onload = loadGallery;
</script>

</body>
</html>
