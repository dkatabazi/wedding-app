<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="VlmrOQKh7IqCthLAT2qYroSfLNtcxjhFoXYJyCffMMM" />
    
    <title>Royal Haven Events & Rentals | Tents, Chairs & Catering Uganda</title>
    <meta name="description" content="Royal Haven Events & Rentals provides premium tents, chairs, and professional catering for weddings and burials in Mubende and across Uganda. Call 0709569351.">
    <meta name="keywords" content="wedding planner Uganda, tent hire Mubende, chair rentals, burial services, event catering">

    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --white: #f8f9fa; --slate: #8892b0; }
        body { font-family: 'Georgia', serif; background: var(--white); color: var(--navy); margin: 0; line-height: 1.6; }
        header { background: var(--navy); color: var(--gold); padding: 80px 20px; text-align: center; border-bottom: 6px solid var(--gold); }
        header h1 { font-size: 3.5em; margin: 0; letter-spacing: 4px; text-transform: uppercase; }
        header p { color: white; font-style: italic; font-size: 1.2em; margin-top: 10px; }
        .quote-box { max-width: 500px; margin: -60px auto 40px; background: white; padding: 40px; border-radius: 15px; box-shadow: 0 15px 50px rgba(0,0,0,0.2); text-align: center; border: 1px solid var(--gold); position: relative; z-index: 10; }
        input { width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 1.1em; box-sizing: border-box; }
        .btn-gold { width: 100%; background: var(--gold); color: var(--navy); padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.2em; transition: 0.3s; }
        #result { margin-top: 25px; font-weight: bold; font-size: 1.5em; color: var(--navy); padding: 10px; border-top: 2px dashed var(--gold); }
        .section-title { text-align: center; margin-top: 60px; font-size: 2em; color: var(--navy); text-transform: uppercase; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; padding: 40px; max-width: 1200px; margin: auto; }
        .gallery-item { height: 300px; border-radius: 12px; overflow: hidden; border: 3px solid white; box-shadow: 0 5px 15px rgba(0,0,0,0.1); background: #eee; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        footer { background: var(--navy); color: white; padding: 60px 20px; text-align: center; margin-top: 80px; }
        .phone-link { font-size: 2em; color: white; text-decoration: none; font-weight: bold; display: block; margin: 20px 0; }
    </style>
</head>
<body>

    <header>
        <h1>ROYAL HAVEN</h1>
        <p>Excellence in Events & Premium Rentals</p>
    </header>

    <div class="quote-box">
        <h3>Get a Professional Quote</h3>
        <input type="number" id="guestCount" placeholder="Number of Guests">
        <button class="btn-gold" onclick="calculateQuote()">Generate Estimate</button>
        <div id="result">Estimate: 0 UGX</div>
    </div>

    <h2 class="section-title">Our Event Portfolio</h2>
    <div class="gallery" id="customerGallery"></div>

    <footer>
        <div class="contact-info">
            <h2>Ready to Book?</h2>
            <a href="tel:0709569351" class="phone-link">📞 0709569351</a>
            <p>Mubende, Uganda | dkatabazi9@gmail.com</p>
        </div>
    </footer>

    <script>
        async function loadContent() {
            const res = await fetch('/api/events');
            const data = await res.json();
            const gallery = document.getElementById('customerGallery');
            gallery.innerHTML = '';
            if(data.inventory && data.inventory.length > 0) {
                data.inventory.forEach(item => {
                    gallery.innerHTML += `<div class="gallery-item"><img src="${item.url}"></div>`;
                });
            } else {
                gallery.innerHTML = '<p style="text-align:center; width:100%;">Portfolio coming soon...</p>';
            }
        }

        function calculateQuote() {
            const guests = document.getElementById('guestCount').value;
            if(!guests) return;
            const total = (guests * 20000) + (guests * 500);
            document.getElementById('result').innerText = `Estimate: ${total.toLocaleString()} UGX`;
        }
        loadContent();
    </script>
</body>
</html>
