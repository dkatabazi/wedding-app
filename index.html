<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Haven Events & Rentals | Premium Services in Uganda</title>
    <meta name="description" content="Royal Haven offers top-tier tent hire, chair rentals, and professional catering for weddings, burials, and corporate events. Quality you can trust.">
    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --white: #f8f9fa; }
        body { font-family: 'Georgia', serif; background: var(--white); color: var(--navy); margin: 0; }
        header { background: var(--navy); color: var(--gold); padding: 80px 20px; text-align: center; border-bottom: 5px solid var(--gold); }
        h1 { font-size: 3em; margin: 0; letter-spacing: 2px; }
        .quote-box { max-width: 500px; margin: -50px auto 40px; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); text-align: center; border: 1px solid var(--gold); }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; padding: 40px; max-width: 1200px; margin: auto; }
        .gallery-item { height: 250px; border-radius: 10px; overflow: hidden; border: 2px solid var(--gold); background: #eee; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        input { width: 80%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; font-size: 1.1em; }
        .btn-gold { background: var(--gold); color: var(--navy); padding: 15px 30px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1.1em; }
        .contact-footer { background: var(--navy); color: white; padding: 40px; text-align: center; margin-top: 50px; }
    </style>
</head>
<body>

    <header>
        <h1>ROYAL HAVEN</h1>
        <p style="font-style: italic; color: white;">Events & Premium Rentals</p>
    </header>

    <div class="quote-box">
        <h3>Instant Quote Generator</h3>
        <p>Planning an event? Get an estimate instantly.</p>
        <input type="number" id="guestCount" placeholder="Number of Guests">
        <button class="btn-gold" onclick="calculateQuote()">Calculate Total</button>
        <div id="result" style="margin-top:20px; font-weight:bold; font-size:1.4em; color: var(--gold);"></div>
    </div>

    <h2 style="text-align:center; color: var(--navy);">Our Recent Work & Setup</h2>
    <div class="gallery" id="customerGallery">
        </div>

    <div class="contact-footer">
        <h2>Ready to Book?</h2>
        <p>Contact our planning team today</p>
        <p style="font-size: 1.5em; color: var(--gold);">📞 0709569351</p>
        <p>Email: dkatabazi9@gmail.com</p>
    </div>

    <script>
        async function loadContent() {
            const res = await fetch('/api/events');
            const data = await res.json();
            const gallery = document.getElementById('customerGallery');
            gallery.innerHTML = '';
            
            // Show photos uploaded in the Admin panel
            if(data.inventory && data.inventory.length > 0) {
                data.inventory.forEach(item => {
                    gallery.innerHTML += `
                        <div class="gallery-item">
                            <img src="${item.url}" alt="${item.desc}">
                        </div>`;
                });
            } else {
                gallery.innerHTML = '<p style="text-align:center; width:100%;">Photos coming soon...</p>';
            }
        }

        function calculateQuote() {
            const guests = document.getElementById('guestCount').value;
            if(!guests) return;
            // Your math: 20,000 for food + 500 for chair per person
            const total = (guests * 20000) + (guests * 500);
            document.getElementById('result').innerText = `Estimated: ${total.toLocaleString()} UGX`;
        }

        loadContent();
    </script>
</body>
</html>
