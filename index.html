<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxury Wedding Planner</title>
    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --white: #e6f1ff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--navy); color: var(--white); padding: 20px; }
        .container { max-width: 800px; margin: auto; background: rgba(255,255,255,0.05); padding: 30px; border-radius: 15px; border: 1px solid var(--gold); }
        h1 { text-align: center; color: var(--gold); text-transform: uppercase; letter-spacing: 2px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--gold); }
        input, select { width: 100%; padding: 10px; border-radius: 5px; border: none; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--gold); color: var(--navy); border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        table { width: 100%; margin-top: 30px; border-collapse: collapse; background: white; color: black; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: var(--gold); color: var(--navy); }
        .total-box { margin-top: 20px; padding: 15px; background: var(--gold); color: var(--navy); border-radius: 10px; text-align: right; font-size: 1.2em; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Wedding Vendor Manager</h1>
        
        <div class="form-group">
            <label>Vendor/Service Name</label>
            <input type="text" id="vendorName" placeholder="e.g. Classic Caterers">
        </div>

        <div class="form-group">
            <label>Service Category</label>
            <select id="category">
                <option value="Decoration">Decoration & Design</option>
                <option value="Catering">Cooking & Catering</option>
                <option value="Music">Sound & Entertainment</option>
                <option value="Photography">Photography/Video</option>
                <option value="Venue">Venue Hire</option>
            </select>
        </div>

        <div class="form-group">
            <label>Amount (USD/Local)</label>
            <input type="number" id="amount" placeholder="0.00">
        </div>

        <button onclick="addVendor()">Book Service & Save</button>

        <table id="vendorTable">
            <thead>
                <tr>
                    <th>Vendor</th>
                    <th>Category</th>
                    <th>Amount</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>

        <div class="total-box" id="totalBox">Total Budget: 0</div>
    </div>

    <script>
        async function loadVendors() {
            const res = await fetch('/api/events');
            const data = await res.json();
            const body = document.getElementById('tableBody');
            let total = 0;
            body.innerHTML = '';
            
            data.forEach(item => {
                total += parseFloat(item.amount || 0);
                body.innerHTML += `<tr>
                    <td>${item.name}</td>
                    <td>${item.category}</td>
                    <td>${item.amount}</td>
                </tr>`;
            });
            document.getElementById('totalBox').innerText = `Total Budget: ${total}`;
        }

        async function addVendor() {
            const name = document.getElementById('vendorName').value;
            const category = document.getElementById('category').value;
            const amount = document.getElementById('amount').value;

            if(!name || !amount) return alert("Fill all fields");

            await fetch('/api/events', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, category, amount })
            });

            document.getElementById('vendorName').value = '';
            document.getElementById('amount').value = '';
            loadVendors();
        }

        loadVendors();
    </script>
</body>
</html>
